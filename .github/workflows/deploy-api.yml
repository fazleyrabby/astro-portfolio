name: Deploy API (cPanel)

on:
  push:
    branches: ["main"]
    paths:
      - "apps/api/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: ${{ secrets.SERVER_PORT || 22011 }}
          source: "apps/api/src/server.js,apps/api/package.json"
          target: "/home/${{ secrets.SERVER_USER }}/api.rhtech.dev"
          strip_components: 2

      - name: Install & Restart
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: ${{ secrets.SERVER_PORT || 22011 }}
          script: |
            export GIT_SHA=${{ github.sha }}
            cd ~/api.rhtech.dev
            bash deploy.sh
